apiVersion: v1
kind: Pod
metadata:
  name: ipc-bench-tcp
  namespace: ipc-bench
spec:
  restartPolicy: Never
  containers:
  - name: sidecar
    image: ipc-bench:latest
    imagePullPolicy: Never
    args: ["--role=sidecar", "--method=tcp", "--address=127.0.0.1:9000", "--size=5120"]
    resources:
      requests: { cpu: "1", memory: "256Mi" }
      limits:   { cpu: "1", memory: "256Mi" }
  - name: main
    image: ipc-bench:latest
    imagePullPolicy: Never
    args: ["--role=main", "--method=tcp", "--address=127.0.0.1:9000",
           "--size=5120", "--count=100000", "--warmup=10000", "--json"]
    resources:
      requests: { cpu: "1", memory: "256Mi" }
      limits:   { cpu: "1", memory: "256Mi" }
