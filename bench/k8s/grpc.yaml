apiVersion: v1
kind: Pod
metadata:
  name: ipc-bench-grpc
  namespace: ipc-bench
spec:
  restartPolicy: Never
  volumes:
  - name: socket-dir
    emptyDir: { medium: Memory }
  containers:
  - name: sidecar
    image: ipc-bench:latest
    imagePullPolicy: Never
    args: ["--role=sidecar", "--method=grpc", "--socket-path=/run/ipc", "--size=5120"]
    volumeMounts:
    - { name: socket-dir, mountPath: /run/ipc }
    resources:
      requests: { cpu: "1", memory: "256Mi" }
      limits:   { cpu: "1", memory: "256Mi" }
  - name: main
    image: ipc-bench:latest
    imagePullPolicy: Never
    args: ["--role=main", "--method=grpc", "--socket-path=/run/ipc",
           "--size=5120", "--count=100000", "--warmup=10000", "--json"]
    volumeMounts:
    - { name: socket-dir, mountPath: /run/ipc }
    resources:
      requests: { cpu: "1", memory: "256Mi" }
      limits:   { cpu: "1", memory: "256Mi" }
